info:
  contact: {}
paths:
  /audit-logs:
    get:
      description: 根据操作者ID分页查询审计日志
      parameters:
      - description: 操作者ID
        in: query
        name: operator_id
        required: true
        type: integer
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-github_com_lyj404_gin-api-template_domain_dto_PaginationResponse'
        "400":
          description: 缺少操作者ID
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
      summary: 按操作者查询审计日志
      tags:
      - 审计
  /audit-logs/target:
    get:
      description: 根据目标类型和ID分页查询审计日志
      parameters:
      - description: 目标类型
        in: query
        name: target_type
        required: true
        type: string
      - description: 目标ID
        in: query
        name: target_id
        required: true
        type: integer
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-github_com_lyj404_gin-api-template_domain_dto_PaginationResponse'
        "400":
          description: 缺少参数
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
      summary: 按目标查询审计日志
      tags:
      - 审计
  /audit-logs/time:
    get:
      description: 根据时间范围分页查询审计日志
      parameters:
      - description: 开始时间
        in: query
        name: start_time
        type: string
      - description: 结束时间
        in: query
        name: end_time
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-github_com_lyj404_gin-api-template_domain_dto_PaginationResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
      summary: 按时间范围查询审计日志
      tags:
      - 审计
  /hello:
    get:
      consumes:
      - application/json
      description: 返回一个简单的消息
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
      summary: 测试
      tags:
      - hello
  /login:
    post:
      consumes:
      - application/json
      description: 处理用户登录请求，验证凭据并返回访问token和刷新token
      parameters:
      - description: 登录请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功响应
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-github_com_lyj404_gin-api-template_domain_dto_LoginResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "401":
          description: 凭据无效
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "404":
          description: 用户未找到
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
      summary: 用户登录
      tags:
      - user
  /menus:
    get:
      description: 获取菜单列表（支持分页、搜索、排序）
      parameters:
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10，最大100
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词（搜索菜单名称）
        in: query
        name: keyword
        type: string
      - description: 排序字段
        in: query
        name: order_by
        type: string
      - description: 排序方式：asc/desc
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-github_com_lyj404_gin-api-template_domain_dto_PaginationResponse'
      summary: 获取菜单列表
      tags:
      - 菜单
    post:
      consumes:
      - application/json
      description: 创建新菜单
      parameters:
      - description: 菜单信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_dto.CreateMenuRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-github_com_lyj404_gin-api-template_domain_dto_MenuResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
      summary: 创建菜单
      tags:
      - 菜单
  /menus/:id:
    delete:
      consumes:
      - application/json
      description: 删除菜单
      parameters:
      - description: 菜单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/github_com_lyj404_gin-api-template_domain_result.ResponseResult-string'
      summary: 删除菜单
      tags:
      - 菜单
    get:
      description: 根据ID获取菜单详情
      parameters:
      - description: 菜单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
